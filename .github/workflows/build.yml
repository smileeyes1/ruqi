name: RuqiEduOS MESC Pure Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2
        cache-disabled: true

    - name: Inject Wrapper
      run: gradle wrapper --gradle-version 8.2

    - name: Permissions
      run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleDebug --stacktrace
