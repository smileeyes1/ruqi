name: RuqiEduOS MESC Self-Healing Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle Global Runtime
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2
        cache-disabled: true

    - name: Inject & Repair Gradle Wrapper Binaries
      run: gradle wrapper --gradle-version 8.2

    - name: Grant Execute Permissions for Gradlew
      run: chmod +x gradlew

    - name: Compile and Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Sovereign Educational APK
      uses: actions/upload-artifact@v4
      with:
        name: RuqiEduOS-MESC-Core-APK
        path: app/build/outputs/apk/debug/app-debug.apk
