name: Build Android APK Production
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js Runtime Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Project Dependencies
      run: npm install

    - name: Setup Java Development Kit v17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configure Android SDK Tools & Accept Licenses
      uses: android-actions/setup-android@v3
      with:
        log-accepted-licenses: true

    - name: Accept Android SDK Licenses Manually via Shell
      run: |
        mkdir -p ${ANDROID_HOME}/licenses
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > ${ANDROID_HOME}/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > ${ANDROID_HOME}/licenses/android-sdk-preview-license

    - name: Clean Initialize Capacitor Android Platform
      run: |
        npx cap init "Ruqi OS" "com.ruqi.educationalos" --web-dir=www || true
        npx cap add android || true

    - name: Synchronize Web Assets to Capacitor Platform
      run: npx cap sync android

    - name: Grant Critical Execute Permission to Gradle Wrapper
      run: chmod +x android/gradlew

    - name: Compile Application via Native Gradle Wrapper
      working-directory: ./android
      run: ./gradlew assembleDebug

    - name: Export Compiled APK Artifact Securely
      uses: actions/upload-artifact@v4
      with:
        name: RuqiOS-Flat-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
