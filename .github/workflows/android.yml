name: Build Android APK Production
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Setup Node.js Runtime Environment
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Project Dependencies
      run: npm install

    - name: Setup Java Development Kit v17
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configure Android SDK Tools
      uses: android-actions/setup-android@v2

    - name: Initialize Native Android Scaffold
      run: npx cap add android || true

    - name: Synchronize Web Assets to Capacitor Platform
      run: npx cap sync android

    - name: Grant Critical Execute Permission to Gradle Wrapper
      run: chmod +x android/gradlew

    - name: Compile Application via Native Gradle Wrapper
      working-directory: ./android
      run: ./gradlew assembleDebug

    - name: Export Compiled APK Artifact Securely
      uses: actions/upload-artifact@v3
      with:
        name: RuqiOS-Flat-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
