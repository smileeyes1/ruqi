name: Build Android APK Production
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js Runtime Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Project Dependencies
      run: |
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Setup Java Development Kit v17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configure Android SDK Tools
      uses: android-actions/setup-android@v3

    - name: Guarantee Web Directory scaffold
      run: |
        mkdir -p www
        echo '<html dir="rtl"><head><meta charset="utf-8"></head><body><h1>Ruqi OS Baseline</h1></body></html>' > www/index.html

    - name: Universal Capacitor Native Scaffold Initialization
      run: |
        npx cap init "Ruqi OS" "com.ruqi.educationalos" --web-dir=www || true
        npx cap add android || true

    - name: Synchronize Web Assets to Capacitor Platform
      run: npx cap sync android

    - name: Grant Critical Execute Permission to Gradle Wrapper
      run: chmod +x android/gradlew

    - name: Compile Application via Native Gradle Wrapper
      working-directory: ./android
      run: ./gradlew assembleDebug

    - name: Export Compiled APK Artifact Securely
      uses: actions/upload-artifact@v4
      with:
        name: RuqiOS-Flat-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
