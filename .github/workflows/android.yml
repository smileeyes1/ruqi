name: Build Android APK Production
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout Source Code Master Copy
      uses: actions/checkout@v4

    - name: Setup Node.js Stable Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Clean Install Production Dependencies
      run: npm ci || npm install

    - name: Setup Java Development Kit v17 Enterprise
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configure Android SDK Environment and Licenses
      uses: android-actions/setup-android@v3
      with:
        log-accepted-licenses: true

    - name: Enforce SDK Terms and Conditions Acceptance
      run: |
        mkdir -p ${ANDROID_HOME}/licenses
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > ${ANDROID_HOME}/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > ${ANDROID_HOME}/licenses/android-sdk-preview-license

    - name: Initialize Android Native Target Scaffold
      run: |
        npx cap init "Ruqi OS Pro" "com.ruqi.educationalos" --web-dir=www || true
        npx cap add android || true

    - name: Synchronize Web Static Files to Native Container
      run: npx cap sync android

    - name: Apply Execution Security Overlays to Gradle
      run: chmod +x android/gradlew

    - name: Build Application Packaging Debug APK
      working-directory: ./android
      run: ./gradlew assembleDebug

    - name: Upload Finished Production Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RuqiOS-Enterprise-Production-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
