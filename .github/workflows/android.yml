name: Build Android APK Production
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # إجبار البيئة على تشغيل الـ Actions المتوافقة مع Node 24 لمنع التنبيهات وإيقاف الدعم
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js Runtime Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20' # يمكنك ترقيتها إلى '22' أو '24' لاحقاً إذا كانت مكتبات مشروعك تدعم ذلك

    - name: Install Project Dependencies
      run: npm install

    - name: Setup Java Development Kit v17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configure Android SDK Tools
      uses: android-actions/setup-android@v3

    - name: Initialize Native Android Scaffold
      run: npx cap add android || true

    - name: Synchronize Web Assets to Capacitor Platform
      run: npx cap sync android

    - name: Grant Critical Execute Permission to Gradle Wrapper
      run: chmod +x android/gradlew

    - name: Compile Application via Native Gradle Wrapper
      working-directory: ./android
      run: ./gradlew assembleDebug

    - name: Export Compiled APK Artifact Securely
      uses: actions/upload-artifact@v4
      with:
        name: RuqiOS-Flat-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
