name: Automated Intelligent Worksheet Generator

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      lesson_selection:
        description: 'اختر الدرس المعتمد من المنهج لتوليد ورقة العمل فوراً'
        required: true
        default: 'p1_addition_10'
        type: choice
        options:
          - 'p1_numbers_to_5'
          - 'p1_components_to_9'
          - 'p1_addition_to_9'
          - 'p1_subtraction_to_9'
          - 'p1_addition_10'
          - 'p2_numbers_to_99'
          - 'p2_addition_with_carrying'
          - 'p2_subtraction_with_borrowing'
          - 'p2_multiplication'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Execute Local Intelligence Engine
        env:
          LESSON_TYPE: ${{ github.event.inputs.lesson_selection || 'p1_addition_10' }}
        run: python generate.py

      - name: Setup GitHub Pages Environment
        uses: actions/configure-pages@v4

      - name: Upload Finished Web Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy_to_pages:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build_and_generate
    steps:
      - name: Deploy Sheet Live
        id: deployment
        uses: actions/deploy-pages@v4
