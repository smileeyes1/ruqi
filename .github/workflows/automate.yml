name: Sovereign Automation Matrix (CI/CD)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  android-build:
    name: Compile Android Application
    runs-on: ubuntu-latest

    steps:
      # ١. جلب الكود المصدري من المستودع
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # ٢. تهيئة بيئة Node.js لتشغيل حزم الإعدادات
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ٣. تثبيت الاعتمادات والمكتبات بدقة صارمة دون تضارب
      - name: Install Project Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      # ٤. إعداد بيئة جافا للأندرويد (JDK 17)
      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ٥. مزامنة وتحويل كود الويب (www) إلى تطبيق أندرويد تلقائياً
      - name: Capacitor Android Sync
        run: |
          npx cap init "Teacher App" "com.smileeyes1.teacher" --web-dir=www || true
          npx cap add android || true
          npx cap sync android

      # ٦. بناء وتجميع ملف الـ APK النهائي عبر Gradle
      - name: Build Android Debug APK
        run: |
          if [ -d "android" ]; then
            cd android
            chmod +x ./gradlew
            ./gradlew assembleDebug --stacktrace
          else
            echo "Error: Android project was not generated properly."
            exit 1
          fi

      # ٧. رفع تطبيق الـ APK المتولد كملف جاهز للتحميل المباشر
      - name: Export Output Application Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zaytouna-Smart-Classroom-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # ٨. وحدة التحكم والتشخيص التلقائي الذكي بواسطة جيميني (تُستدعى فقط عند الفشل)
      - name: AI Auto-Diagnostic on Failure
        if: failure()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "تنبيه: مفتاح GEMINI_API_KEY غير مضاف في مخزن جيتهاب السري للـ Actions."
            exit 0
          fi
          echo "جاري سحب تقرير الخطأ وتحليله برمجياً عبر جيميني..."
          ERROR_CONTEXT="GitHub Actions build pipeline failed during Android compilation setup."
          PAYLOAD=$(jq -n --arg msg "$ERROR_CONTEXT" '{contents: [{parts: [{text: ("Analyze this Android build execution failure and provide a single clean code fix: " + $msg)}]}]}')
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "====================================="
          echo "   توجيه جيميني الذكي لإصلاح الخطأ   "
          echo "====================================="
          echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' || echo "تعذر معالجة رد الذكاء الاصطناعي تلقائياً."
