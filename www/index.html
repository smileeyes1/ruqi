<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>نظام رقي التشغيلي التعليمي | RuqiEducationalOS Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="saas-dark-kernel">

    <header class="os-navigation-bar print-hide">
        <div class="brand-identity-block">
            <div class="logo-neon-glow">💎</div>
            <div class="brand-meta-text">
                <h1>RUQI<span>OS</span> <mark class="pro-badge">PRO</mark></h1>
                <small>Next-Gen Educational Operating System</small>
            </div>
        </div>
        <nav class="nav-control-links">
            <button id="nav-home" class="tab-link active" onclick="window.RuqiOS.navigate('home')">🛸 بوابة الطالب</button>
            <button id="nav-teacher" class="tab-link" onclick="window.RuqiOS.navigate('teacher')">🛡️ لوحة المعلم الخارقة</button>
            <button id="nav-monetization" class="tab-link" onclick="window.RuqiOS.navigate('monetization')">💰 تفعيل الاشتراكات</button>
            <button id="nav-emergency" class="tab-emergency-link" onclick="window.RuqiOS.navigate('emergency')">🚨 الطوارئ</button>
        </nav>
    </header>

    <main id="app-root-workspace" class="workspace-viewport"></main>

    <div class="ai-floating-assistant-panel print-hide" id="ai-assistant-widget">
        <button class="assistant-trigger-btn" onclick="window.RuqiOS.toggleAssistant()">💬 مساعد رقي الذكي</button>
        <div class="assistant-chat-box hidden" id="chat-box-viewport">
            <div class="chat-header">النظام الخبير المتعدد للذكاء الاصطناعي 🧠</div>
            <div class="chat-messages-log" id="chat-messages-container">
                <div class="msg system">مرحباً بك في نظام رقي الخبير. كيف يمكنني مساعدتك اليوم في بناء وتطوير المناهج؟</div>
            </div>
            <div class="chat-footer-inputs">
                <input type="text" id="chat-input-field" placeholder="اسأل نظام الذكاء الخبير..." onkeypress="if(event.key === 'Enter') window.RuqiOS.sendAssistantMessage()"/>
                <button onclick="window.RuqiOS.sendAssistantMessage()">إرسال</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
